<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Révision SNT - Sciences Numériques et Technologie</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/home.css">
    <link rel="stylesheet" href="styles/qcm.css">
    <link rel="stylesheet" href="styles/flashcards.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles-background" id="particles"></div>
    
    <div id="app" class="app-container">
        <!-- Page d'accueil -->
        <div id="home-page" class="page active">
            <div class="home-content">
                <div class="logo-section">
                    <div class="tech-logo">
                        <span class="bracket">{</span>
                        <span class="logo-text">SNT</span>
                        <span class="bracket">}</span>
                    </div>
                    <h1 class="main-title">Sciences Numériques et Technologie</h1>
                    <p class="subtitle">Plateforme de révision interactive</p>
                </div>

                <div class="chapter-selection">
                    <h2 class="section-title">Sélectionnez les chapitres à réviser</h2>
                    <div class="chapters-grid" id="chapters-grid">
                        <!-- Généré dynamiquement -->
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="start-qcm" class="action-btn qcm-btn" disabled>
                        <span class="btn-icon">📝</span>
                        <span class="btn-text">Mode QCM</span>
                    </button>
                    <button id="start-flashcards" class="action-btn flashcard-btn" disabled>
                        <span class="btn-icon">🃏</span>
                        <span class="btn-text">Mode Fiches</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Page QCM -->
        <div id="qcm-page" class="page">
            <div class="qcm-header">
                <button id="qcm-back" class="back-btn">← Retour</button>
                <div class="qcm-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="progress-text" id="progress-text">Question 1/10</span>
                </div>
            </div>
            <div class="qcm-content" id="qcm-content">
                <!-- Généré dynamiquement -->
            </div>
        </div>

        <!-- Page Flashcards -->
        <div id="flashcards-page" class="page">
            <div class="flashcards-header">
                <button id="flashcards-back" class="back-btn">← Retour</button>
                <div class="flashcards-controls">
                    <button id="prev-card" class="nav-btn">◀</button>
                    <span class="card-counter" id="card-counter">1/10</span>
                    <button id="next-card" class="nav-btn">▶</button>
                </div>
            </div>
            <div class="flashcards-container" id="flashcards-container">
                <!-- Généré dynamiquement -->
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/qcm.js"></script>
    <script src="js/flashcards.js"></script>
</body>
</html>
